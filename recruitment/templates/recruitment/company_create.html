{% extends 'recruitment/base.html' %}<div class="container">
    <h2>Companies</h2>
    <a href="{% url 'recruitment:company_create' %}" class="btn btn-primary mb-3">Add New Company</a>
    <ul class="list-group">
        {% for company in companies %}
            <li class="list-group-item">{{ company.name }} - {{ company.email }}</li>
        {% empty %}
            <li class="list-group-item">No companies found.</li>
        {% endfor %}
    </ul>
{% endblock %}
