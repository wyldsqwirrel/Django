{% extends "base.html" %}
{% block content %}
    <h1>Upload CV</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload CV</button>
    </form>
    <p><a href="{% url 'recruitment:candidate_list' %}">Back</a></p>
{% endblock %}
