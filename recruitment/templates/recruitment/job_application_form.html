{% extends "base.html" %}
{% block content %}
    <h1>Apply for a Job</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit Application</button>
    </form>
    <p><a href="{% url 'recruitment:job_application_list' %}">Back</a></p>
{% endblock %}
