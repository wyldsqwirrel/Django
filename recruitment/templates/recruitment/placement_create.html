{% extends 'base.html' %}

{% block title %}Add Placement{% endblock %}

{% block content %}
    <div class="container mt-4">
        <h2 class="mb-4">Add Placement</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="job" class="form-label">Job</label>
                <select name="job" id="job" class="form-control">
                    {% for job in jobs %}
                        <option value="{{ job.id }}">{{ job.job_title }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="candidate" class="form-label">Candidate</label>
                <select name="candidate" id="candidate" class="form-control">
                    <option value="">-- Select Candidate --</option>
                    {% for candidate in candidates %}
                        <option value="{{ candidate.id }}">{{ candidate.full_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="company" class="form-label">Company</label>
                <select name="company" id="company" class="form-control">
                    <option value="">-- Select Company --</option>
                    {% for company in companies %}
                        <option value="{{ company.id }}">{{ company.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="placement_type" class="form-label">Placement Type</label>
                <select name="placement_type" id="placement_type" class="form-control">
                    {% for key, value in placement_type_choices %}
                        <option value="{{ key }}">{{ value }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="start_date" class="form-label">Start Date</label>
                <input type="date" name="start_date" id="start_date" class="form-control">
            </div>

            <div class="mb-3">
                <label for="permanent_base_salary" class="form-label">Permanent Base Salary</label>
                <input type="number" step="0.01" name="permanent_base_salary" id="permanent_base_salary" class="form-control">
            </div>

            <div class="mb-3">
                <label for="day_rate" class="form-label">Day Rate</label>
                <input type="number" step="0.01" name="day_rate" id="day_rate" class="form-control">
            </div>

            <div class="mb-3">
                <label for="commission_percentage" class="form-label">Commission Percentage</label>
                <input type="number" step="0.01" name="commission_percentage" id="commission_percentage" class="form-control" value="10.00">
            </div>

            <div class="mb-3">
                <label for="contract_start_date" class="form-label">Contract Start Date</label>
                <input type="date" name="contract_start_date" id="contract_start_date" class="form-control">
            </div>

            <div class="mb-3">
                <label for="contract_end_date" class="form-label">Contract End Date</label>
                <input type="date" name="contract_end_date" id="contract_end_date" class="form-control">
            </div>

            <button type="submit" class="btn btn-success">Save Placement</button>
            <a href="{% url 'placement_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}
